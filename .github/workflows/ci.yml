name: Smart Inventory CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------------------------------
  # BUILD & TESTS
  # -------------------------------------------
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Run Backend Tests
        env:
          # dummy variables to satisfy config.ts during tests
          NODE_ENV: "test"
          PORT: 5000
          MONGODB_URI: "mongodb://localhost:27017/test-db"
          JWT_SECRET: "super-secret-test-key"
          JWT_ACCESS_EXPIRES_IN: "1h"
          JWT_REFRESH_SECRET: "super-secret-test-key"
          JWT_REFRESH_EXPIRES_IN: "7d"
        run: pnpm --filter backend run test:coverage

      - name: Verify Backend Compilation
        run: pnpm --filter backend build

      - name: Verify Frontend Compilation
        run: pnpm --filter frontend build

      - name: Verify Docker Build
        run: docker compose build

  # -------------------------------------------
  # DEPLOY
  # -------------------------------------------
  deploy:
    needs: build-and-verify
    runs-on: ubuntu-latest
    # This ensures it ONLY deploys when code is pushed to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Trigger Vercel Deployment (Frontend)
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Render Deployment (Backend)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}