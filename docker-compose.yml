services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    ports:
      - "5000:5000"
    command: pnpm --filter backend run dev
    environment:
      - PORT=5000
      - REDIS_URI=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/smart_inventory?schema=public
    env_file:
      - ./backend/.env.local
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/src:/usr/src/app/backend/src
      - ./backend/package.json:/usr/src/app/backend/package.json
      - ./backend/tsconfig.json:/usr/src/app/backend/tsconfig.json
      - ./backend/logs:/usr/src/app/backend/logs

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    ports:
      - "3000:3000"
    command: pnpm --filter frontend run dev
    environment:
      - INTERNAL_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend/src:/usr/src/app/frontend/src
      - ./frontend/public:/usr/src/app/frontend/public
      - ./frontend/package.json:/usr/src/app/frontend/package.json
      - ./frontend/next.config.ts:/usr/src/app/frontend/next.config.ts

volumes:
  postgres_data:
