services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    command: npm run dev
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    environment:
      - INTERNAL_API_URL=http://backend:5000/api
    env_file:
      - ./frontend/.env.local
