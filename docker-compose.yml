services:
  mongodb:
    image: mongo:6.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--logpath", "/dev/null"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb-setup:
    image: mongo:6.0
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb:27017 --eval '
        try {
          if (!rs.status().ok) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongodb:27017" }]
            })
          }
        } catch (e) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "mongodb:27017" }]
          })
        }
      '

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder
    ports:
      - "5000:5000"
    command: pnpm --filter backend run dev
    environment:
      - PORT=5000
      - REDIS_URI=redis://redis:6379
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/smart_inventory}
    env_file:
      - ./backend/.env.local
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/src:/usr/src/app/backend/src
      - ./backend/package.json:/usr/src/app/backend/package.json
      - ./backend/tsconfig.json:/usr/src/app/backend/tsconfig.json
      - ./backend/logs:/usr/src/app/backend/logs

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: builder
    ports:
      - "3000:3000"
    command: pnpm --filter frontend run dev
    environment:
      - INTERNAL_API_URL=http://backend:5000/api
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend/src:/usr/src/app/frontend/src
      - ./frontend/public:/usr/src/app/frontend/public
      - ./frontend/package.json:/usr/src/app/frontend/package.json
      - ./frontend/next.config.ts:/usr/src/app/frontend/next.config.ts

volumes:
  mongodb_data:
